name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\CodexTokenMonitor.slnx

      - name: Build
        run: dotnet build .\CodexTokenMonitor.slnx -c Release --no-restore
